# AI 视频智能重绘 - 配置文件

# 工作目录
work_dir: ./data

# Vid2Vid 管线参数
vid2vid:
  sd_model: "SG161222/Realistic_Vision_V5.1_noVAE"
  device: cuda
  default_strength: 0.35       # 重绘强度 (0.2~0.5 推荐)
  default_steps: 25            # 推理步数
  default_resolution: 768      # 处理分辨率
  default_guidance_scale: 7.5  # CFG 系数
  controlnet_scale: 0.8        # 结构锁定强度
  temporal_smoothing: 0.12     # 时序平滑 (0=关闭)
  deflicker_window: 7          # 去闪烁窗口大小

# Wan2.1 视频内容生成管线
wan2vid:
  model: "Wan-AI/Wan2.1-I2V-14B-720P-Diffusers"
  device: cuda
  device_map: null              # 多GPU时设为 "auto"
  dtype: float16                # float16 或 bfloat16
  quantize: auto                # 量化策略: auto/int8/int4/none
                                #   auto → 根据显存自动选择:
                                #     ≥80GB (A100/H100) → 不量化
                                #     24~80GB (RTX 5090/4090) → INT8
                                #     <24GB → INT4
                                #   int8 → 强制 INT8 (~14GB 权重, 质量接近无损)
                                #   int4 → 强制 INT4 (~8GB 权重, 有损)
                                #   none → 不量化 (~28GB 权重)
  default_steps: 30
  default_guidance_scale: 5.0
  default_resolution: 720       # RTX 5090 建议 480 以节省显存
  max_segment_seconds: 20       # 单次生成最大时长（秒）
  max_video_duration: 300       # 最长支持视频（秒）= 5分钟
  junction_blend_frames: 8      # 段间过渡帧数
  rife_enabled: true            # 是否启用 RIFE 帧插值
  seed: 42

# 视频输出配置
video:
  output_format: mp4
  codec: libx264
  crf: 18                      # 质量 (0=无损, 18=高质量, 23=默认)
  audio_bitrate: 192k

# 日志配置
logging:
  level: INFO
  log_dir: ./logs

# HuggingFace 镜像 (国内加速)
hf_mirror: https://hf-mirror.com
